# ── SQL Server Database ─────────────────────────────────────
spring.datasource.url=${APP_DATASOURCE_URL:jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=QLSinhVien;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${APP_DATASOURCE_USERNAME:sa}
spring.datasource.password=${APP_DATASOURCE_PASSWORD:Truong@01102005}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.database-platform=${APP_JPA_DATABASE_PLATFORM:org.hibernate.dialect.SQLServerDialect}
spring.jpa.hibernate.ddl-auto=${APP_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false

# Khởi tạo schema SQL Server từ schema.sql khi ứng dụng chạy.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=true
 
# ── JWT ──────────────────────────────────────────────────────
app.jwt.secret=SuperSecretKey12345678901234567890_change_in_production
app.jwt.expiration-ms=86400000
app.jwt.reset-expiration-ms=900000

# ── OAuth2 - Google ──────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=806645108353-9m86utrh0cabhto658b9d9lq8jjut32t.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=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
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/auth/oauth2/callback/google

# ── OAuth2 - Facebook ─────────────────────────────────────────
spring.security.oauth2.client.registration.facebook.client-id=YOUR_FACEBOOK_APP_ID
spring.security.oauth2.client.registration.facebook.client-secret=YOUR_FACEBOOK_APP_SECRET
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.registration.facebook.redirect-uri={baseUrl}/api/auth/oauth2/callback/facebook

# ── Mail ─────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=youremail@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
 
# ── Server ───────────────────────────────────────────────────
server.port=8080
app.frontend-url=http://localhost:8080
 
# ── Static Resources ─────────────────────────────────────────
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.add-mappings=true
spring.thymeleaf.enabled=false

# Server port - Render sẽ cấp cổng qua biến PORT
server.port=${PORT:8080}
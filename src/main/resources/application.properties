# ── DATABASE CONFIGURATION (Tự động nhận diện Render hoặc Local) ──
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:jerm12345}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# ── JPA / HIBERNATE ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# ── JWT ──
app.jwt.secret=${JWT_SECRET:SuperSecretKey12345678901234567890_change_in_production}
app.jwt.expiration-ms=86400000

# ── OAuth2 - Google ──────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=806645108353-9m86utrh0cabhto658b9d9lq8jjut32t.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=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
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/auth/oauth2/callback/google

# ── OAuth2 - Facebook ─────────────────────────────────────────
spring.security.oauth2.client.registration.facebook.client-id=YOUR_FACEBOOK_APP_ID
spring.security.oauth2.client.registration.facebook.client-secret=YOUR_FACEBOOK_APP_SECRET
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.registration.facebook.redirect-uri={baseUrl}/api/auth/oauth2/callback/facebook

# ── Mail ─────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:youremail@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Server ───────────────────────────────────────────────────
server.port=${PORT:8080}
app.frontend-url=${FRONTEND_URL:https://quanlysinhvien-o3wo.onrender.com}

# ── Static Resources ─────────────────────────────────────────
spring.web.resources.static-locations=classpath:/static/
spring.thymeleaf.enabled=false
# ── H2 Database ──────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER
spring.datasource.username=sa
spring.datasource.password=jerm12345
spring.datasource.driver-class-name=org.h2.Driver
 
# ── JPA cho H2 ───────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
 
# Chạy schema.sql khi khởi động
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.jpa.defer-datasource-initialization=true
 
# H2 Console — xem dữ liệu tại localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
 
# ── JWT ──────────────────────────────────────────────────────
app.jwt.secret=SuperSecretKey12345678901234567890_change_in_production
app.jwt.expiration-ms=86400000
app.jwt.reset-expiration-ms=900000

# ── OAuth2 - Google ──────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=806645108353-9m86utrh0cabhto658b9d9lq8jjut32t.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=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
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/auth/oauth2/callback/google

# ── OAuth2 - Facebook ─────────────────────────────────────────
spring.security.oauth2.client.registration.facebook.client-id=YOUR_FACEBOOK_APP_ID
spring.security.oauth2.client.registration.facebook.client-secret=YOUR_FACEBOOK_APP_SECRET
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.registration.facebook.redirect-uri={baseUrl}/api/auth/oauth2/callback/facebook

# ── Mail ─────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=youremail@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
 
# ── Server ───────────────────────────────────────────────────
server.port=8080
app.frontend-url=http://localhost:8080
 
# ── Static Resources ─────────────────────────────────────────
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.add-mappings=true
spring.thymeleaf.enabled=false
 
# KHÔNG dùng mvc.view.prefix/suffix — nó làm REST API trả về HTML thay vì JSON

#-----Server port-----
server.port={8080}